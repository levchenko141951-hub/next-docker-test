name: Deploy Frontend
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build --no-cache -t next-app-${{ github.sha }} .

      - name: Save Docker image to tar
        run: docker save next-app-${{ github.sha }} > next-app-${{ github.sha }}.tar

      - name: Upload + deploy
        run: |
          scp next-app-${{ github.sha }}.tar ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/tmp
          
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            docker stop $(docker ps -q) || true
            docker rm next-app || true
            docker load < /tmp/next-app-${{ github.sha }}.tar
            docker run -d --name next-app -p 80:80 --restart unless-stopped next-app-${{ github.sha }}
          EOF
