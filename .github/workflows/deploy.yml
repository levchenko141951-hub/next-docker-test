name: Deploy Frontend
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v3

      - name: Build
        run: docker buildx build --platform linux/amd64 -t ghcr.io/${{ secrets.USER }}/next-app:${{ github.sha }} .

      - name: Login
        run: echo ${{ secrets.PASS }} | docker login ghcr.io -u ${{ secrets.USER }} --password-stdin

      - name: Push
        run: docker push ghcr.io/${{ secrets.USER }}/next-app:${{ github.sha }}

      - name: Deploy
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh ssh -i ~/.ssh/id_rsa \ 
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}
            docker login ghcr.io -u ${{ secrets.USER }} -p ${{ secrets.PASS }}
            docker rm -f next-app || true && \
            docker pull ghcr.io/${{ secrets.USER }}/next-app:${{ github.sha }} &&
            docker run -d -p 80:80 --name next-app ghcr.io/${{ secrets.USER }}/next-app:${{ github.sha }}
          "